name: Deploy Docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for git-based lastUpdated

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs-site

      - name: Build VitePress site
        run: pnpm build
        working-directory: docs-site
        env:
          # Tells the VitePress config to use /cofounder/ base for GitHub Pages.
          # If you set a custom domain (CNAME), set this to / instead.
          VITE_DOCS_BASE: /cofounder/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
