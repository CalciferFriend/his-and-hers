name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to publish (e.g. v0.3.0)"
        required: true
        type: string

jobs:
  # ──────────────────────────────────────────────
  # Preview — dry-run on tag push
  # ──────────────────────────────────────────────
  preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-beta.<N>"
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Check package versions match tag
        run: |
          EXIT=0
          for PKG in packages/core packages/cli packages/cofounder; do
            PKG_VERSION=$(node -p "require('./$PKG/package.json').version")
            PKG_NAME=$(node -p "require('./$PKG/package.json').name")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::$PKG_NAME version ($PKG_VERSION) does not match tag ($VERSION)"
              EXIT=1
            else
              echo "  $PKG_NAME@$PKG_VERSION — OK"
            fi
          done
          if [ "$EXIT" -ne 0 ]; then exit 1; fi

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

      - name: Dry-run publish
        run: pnpm -r publish --no-git-checks --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Publish Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Packages to publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for PKG in packages/core packages/cli packages/cofounder; do
            PKG_NAME=$(node -p "require('./$PKG/package.json').name")
            echo "- \`$PKG_NAME@$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build, typecheck, and tests passed. Ready to publish via **workflow_dispatch**." >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # Publish — manual dispatch with environment gate
  # ──────────────────────────────────────────────
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # for npm OIDC provenance

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Validate tag format
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-beta.<N>"
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Check package versions match tag
        run: |
          for PKG in packages/core packages/cli packages/cofounder; do
            PKG_VERSION=$(node -p "require('./$PKG/package.json').version")
            PKG_NAME=$(node -p "require('./$PKG/package.json').name")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::$PKG_NAME version ($PKG_VERSION) does not match tag ($VERSION)"
              exit 1
            fi
          done

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

      - name: Publish packages
        run: pnpm -r publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Published to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for PKG in packages/core packages/cli packages/cofounder; do
            PKG_NAME=$(node -p "require('./$PKG/package.json').name")
            echo "- \`$PKG_NAME@$VERSION\` — published with provenance" >> "$GITHUB_STEP_SUMMARY"
          done
