# docker-compose.yml — his-and-hers
#
# Profiles:
#   - default (no profile): H1 only
#   - h2-cpu: H1 + H2 (CPU/Ollama)
#   - h2-cuda: H1 + H2 (NVIDIA GPU/Ollama)
#
# Quick start (H1 only):
#   cp docker/.env.example docker/.env
#   docker compose -f docker/docker-compose.yml up -d
#
# With H2 (CPU Ollama):
#   docker compose -f docker/docker-compose.yml --profile h2-cpu up -d
#
# With H2 (NVIDIA GPU):
#   docker compose -f docker/docker-compose.yml --profile h2-cuda up -d
#
# NOTE: H1 and H2 usually run on *separate machines*. This compose file
# is useful when you want to prototype both sides locally or run a H2
# in a Linux container on the same Tailscale network.

name: his-and-hers

# ─── H1 (orchestrator) ───────────────────────────────────────────────────────
services:
  tom:
    build:
      context: ..
      dockerfile: docker/tom/Dockerfile
    image: calcifer-ai/tom:latest
    container_name: h1
    restart: unless-stopped

    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun

    environment:
      # Required
      TS_AUTHKEY: "${TS_AUTHKEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

      # Optional — H1 identity
      H1_NAME: "${H1_NAME:-H1}"
      TOM_EMOJI: "${TOM_EMOJI:-🐱}"
      TOM_MODEL: "${TOM_MODEL:-claude-sonnet-4-6}"
      TOM_GATEWAY_PORT: "${TOM_GATEWAY_PORT:-18789}"
      TOM_GATEWAY_TOKEN: "${TOM_GATEWAY_TOKEN:-}"  # auto-generated if empty

      # H2 peer connection (fill in after H2 starts)
      JERRY_TAILSCALE_HOSTNAME: "${JERRY_TAILSCALE_HOSTNAME:-}"
      JERRY_TAILSCALE_IP: "${JERRY_TAILSCALE_IP:-}"
      JERRY_GATEWAY_PORT: "${JERRY_GATEWAY_PORT:-18789}"
      JERRY_GATEWAY_TOKEN: "${JERRY_GATEWAY_TOKEN:-}"
      JERRY_SSH_USER: "${JERRY_SSH_USER:-root}"

      # Wake-on-LAN (optional)
      JERRY_WOL_ENABLED: "${JERRY_WOL_ENABLED:-false}"
      JERRY_WOL_MAC: "${JERRY_WOL_MAC:-}"
      JERRY_WOL_BROADCAST: "${JERRY_WOL_BROADCAST:-}"

    volumes:
      - tailscale-tom:/var/lib/tailscale
      - tom-openclaw:/root/.openclaw
      - his-and-hers-config:/root/.his-and-hers
      # Mount SSH key if using SSH to H2:
      # - ./ssh/id_ed25519:/root/.ssh/id_ed25519:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:${TOM_GATEWAY_PORT:-18789}/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─── H2 — CPU / Ollama (profile: h2-cpu) ────────────────────────────────
  h2-cpu:
    profiles: ["h2-cpu"]
    build:
      context: ..
      dockerfile: docker/h2/Dockerfile
    image: calcifer-ai/jerry:latest
    container_name: h2
    restart: unless-stopped

    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun

    environment:
      TS_AUTHKEY: "${JERRY_TS_AUTHKEY:-${TS_AUTHKEY}}"
      H2_NAME: "${H2_NAME:-H2}"
      JERRY_EMOJI: "${JERRY_EMOJI:-🐭}"
      JERRY_MODEL: "${JERRY_MODEL:-llama3.2}"
      JERRY_PROVIDER: "${JERRY_PROVIDER:-ollama}"
      JERRY_GATEWAY_PORT: "${JERRY_GATEWAY_PORT:-18789}"
      JERRY_GATEWAY_TOKEN: "${JERRY_GATEWAY_TOKEN:-}"
      JERRY_OLLAMA_MODELS: "${JERRY_OLLAMA_MODELS:-llama3.2}"

      # H1 peer (so H2 knows where to report back)
      H1_NAME: "${H1_NAME:-H1}"
      TOM_TAILSCALE_IP: "${TOM_TAILSCALE_IP:-}"
      TOM_GATEWAY_PORT: "${TOM_GATEWAY_PORT:-18789}"
      TOM_GATEWAY_TOKEN: "${TOM_GATEWAY_TOKEN:-}"

      # H1's SSH public key (so H1 can SSH to H2)
      TOM_SSH_PUBKEY: "${TOM_SSH_PUBKEY:-}"

    volumes:
      - tailscale-jerry:/var/lib/tailscale
      - h2-openclaw:/root/.openclaw
      - h2-hh-config:/root/.his-and-hers
      - h2-ollama:/root/.ollama  # persist downloaded models

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:${JERRY_GATEWAY_PORT:-18789}/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s  # Ollama startup takes longer
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─── H2 — NVIDIA CUDA (profile: h2-cuda) ────────────────────────────────
  h2-cuda:
    profiles: ["h2-cuda"]
    build:
      context: ..
      dockerfile: docker/h2/Dockerfile.cuda
    image: calcifer-ai/h2-cuda:latest
    container_name: h2
    restart: unless-stopped

    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun

    environment:
      TS_AUTHKEY: "${JERRY_TS_AUTHKEY:-${TS_AUTHKEY}}"
      H2_NAME: "${H2_NAME:-H2}"
      JERRY_EMOJI: "${JERRY_EMOJI:-🤖}"
      JERRY_MODEL: "${JERRY_MODEL:-llama3.2}"
      JERRY_PROVIDER: "${JERRY_PROVIDER:-ollama}"
      JERRY_GATEWAY_PORT: "${JERRY_GATEWAY_PORT:-18789}"
      JERRY_GATEWAY_TOKEN: "${JERRY_GATEWAY_TOKEN:-}"
      JERRY_OLLAMA_MODELS: "${JERRY_OLLAMA_MODELS:-llama3.2}"

      H1_NAME: "${H1_NAME:-H1}"
      TOM_TAILSCALE_IP: "${TOM_TAILSCALE_IP:-}"
      TOM_GATEWAY_PORT: "${TOM_GATEWAY_PORT:-18789}"
      TOM_GATEWAY_TOKEN: "${TOM_GATEWAY_TOKEN:-}"
      TOM_SSH_PUBKEY: "${TOM_SSH_PUBKEY:-}"

    volumes:
      - tailscale-jerry:/var/lib/tailscale
      - h2-openclaw:/root/.openclaw
      - h2-hh-config:/root/.his-and-hers
      - h2-ollama:/root/.ollama

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:${JERRY_GATEWAY_PORT:-18789}/health"]
      interval: 30s
      timeout: 5s
      start_period: 180s  # First GPU boot + model pull takes time
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  tailscale-tom:
  tailscale-jerry:
  tom-openclaw:
  his-and-hers-config:
  h2-openclaw:
  h2-hh-config:
  h2-ollama:   # Large volume — Ollama models can be multi-GB
